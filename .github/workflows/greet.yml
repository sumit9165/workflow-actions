name: Greeting Workflow

on:
  workflow_dispatch:

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run greeting action
        id: greet
        uses: ./.github/actions/setup-and-greet
        with:
          name: "Developer"
          language: "en"

      - name: Verify output
        run: echo "Greeted = ${{ steps.greet.outputs.greeted }}"