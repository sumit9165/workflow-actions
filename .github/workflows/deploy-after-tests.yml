name: Deploy After Tests

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check test result
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "Tests failed. Deployment aborted."
          exit 1

      - name: Deploy
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        run: echo "Tests passed. Deploying..."